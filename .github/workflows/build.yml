name: Build EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "kivy[base]" pyinstaller

      - name: PyInstaller build
        run: |
          pyinstaller --onefile --windowed ^
            --name TankHacim ^
            --add-data "tank_data.json;." ^
            --add-data "custom_tanks.json;." ^
            --hidden-import=kivy ^
            --hidden-import=kivy.core.window.window_sdl2 ^
            --hidden-import=kivy.core.image.img_sdl2 ^
            main.py
        shell: cmd

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TankHacim-exe
          path: dist/TankHacim.exe
